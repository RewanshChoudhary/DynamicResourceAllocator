hard_rules:
  - name: availability
    enabled: true
  - name: vehicle_type
    enabled: true
  - name: max_distance
    enabled: true
    params:
      max_distance_km: 5.0
  - name: min_rating
    enabled: true
    params:
      min_rating: 3.5
  - name: vehicle_condition
    enabled: true
    params:
      min_condition: 1
  - name: weather_safety
    enabled: true
    params:
      severe_conditions:
        - Stormy
        - Sandstorms
      restricted_vehicles:
        - MOTORCYCLE
        - SCOOTER

vehicle_compatibility:
  bike:
    - bike
    - scooter
  scooter:
    - scooter
    - bike
  car:
    - car

scoring_rules:
  - name: proximity_score
    enabled: true
    params:
      scale_km: 10.0
  - name: rating_score
    enabled: true
  - name: fairness_score
    enabled: true
  - name: on_time_rate
    enabled: true
    params:
      baseline_minutes: 30
  - name: traffic_adjusted_proximity
    enabled: false
    params:
      max_distance_km: 10.0
      traffic_multipliers:
        Low: 1.0
        Medium: 1.3
        High: 1.6
        Jam: 2.2

weights:
  proximity_score: 0.35
  rating_score: 0.20
  fairness_score: 0.30
  on_time_rate: 0.15
  traffic_adjusted_proximity: 0.0

fairness:
  threshold: 0.35
  escalation_factor: 1.5
  window_minutes: 60
